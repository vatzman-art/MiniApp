<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>myBoticProxy</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            background: var(--tg-theme-bg-color, #fff); 
            color: var(--tg-theme-text-color, #000); 
            font-family: sans-serif; 
            margin: 0; 
            padding: 16px; 
        }
             .btn { 
            display: block; 
            width: 75%; 
            padding: 14px; 
            margin: 8px auto; /* 8px сверху/снизу, auto слева/справа (центрирует) */ 
            background: var(--tg-theme-button-color, #3390ec); 
            color: var(--tg-theme-button-text-color, #fff); 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease; /* плавный переход */
        }
        
        .btn:hover {
            transform: scale(1.05);/* увеличение на 5% */
            background-color: #ffd700;
            box-shadow: 22px -11px 39px -8px rgba(62, 66, 11, 0.91);
        }
        
        .btn:active { opacity: 0.85; }
        .btn.secondary { background: #888; }
        #status { text-align: center; margin-top: 15px; color: #666; font-size: 14px; }; /* плавный переход */
        }
        
    </style>
</head>
<body>
    <h2 style="margin-bottom:20px;text-align:center">Добро пожаловать!</h2>

    <!-- КНОПКИ ГЛАВНОГО МЕНЮ -->
    <button class="btn" onclick="send('buy_proxy')">🛒 Купить прокси</button>
    <button class="btn" onclick="send('check_balance')">💰 Баланс</button>
    <button class="btn" onclick="send('show_tariffs')">📊 Тарифы</button>
    <button class="btn" onclick="send('show_help')">❓ Помощь</button>
    <button class="btn" onclick="send('show_support')">💬 Поддержка</button>

    <p id="status"></p>

    <script>
        // Инициализация Telegram WebApp
        const tg = Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Универсальная функция отправки
        function send(command) {
            const status = document.getElementById('status');
            status.innerText = '⏳ Отправка...';
            
            // Отправляем данные боту
            tg.sendData(command);
            
            // Если окно не закрылось за 1.5 сек — закрываем принудительно
            setTimeout(() => { if (!tg.isClosed) tg.close(); }, 1500);
        }
    </script>
</body>
</html>
